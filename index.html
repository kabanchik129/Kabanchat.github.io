    <!-- Canonical URL -->

    <!-- Стили для предотвращения FOUC (Flash of Unstyled Content) -->
    <style>
      html {
        background: #0f172a;
        color: #f1f5f9;
      }
      
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #0f172a;
        color: #f1f5f9;
      }
      
      #root {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Простой лоадер пока загружается React */
      .app-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      
      .app-loading-content {
        text-align: center;
        animation: fadeIn 0.5s ease-in;
      }
      
      .app-loading-logo {
        font-size: 3rem;
        margin-bottom: 1rem;
        animation: bounce 2s ease-in-out infinite;
      }
      
      .app-loading-text {
        color: #cbd5e1;
        font-size: 1.1rem;
        margin-bottom: 2rem;
      }
      
      .app-loading-spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto;
        border: 4px solid rgba(99, 102, 241, 0.1);
        border-radius: 50%;
        border-top-color: #6366f1;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      /* Поддержка высокого контраста */
      @media (prefers-contrast: more) {
        .app-loading-spinner {
          border-color: rgba(0, 0, 0, 0.2);
          border-top-color: #000;
        }
      }
      
      /* Поддержка редуцированной анимации */
      @media (prefers-reduced-motion: reduce) {
        .app-loading-logo,
        .app-loading-spinner {
          animation: none;
        }
      }
    </style>
    
    <!-- No-JS fallback -->
    <noscript>
      <style>
        #root::before {
          content: "KabanChat требует включенный JavaScript. Пожалуйста, включите JavaScript в настройках браузера.";
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: #0f172a;
          color: #f1f5f9;
          font-family: system-ui;
          text-align: center;
          padding: 2rem;
          font-size: 1.1rem;
        }
      </style>
    </noscript>
  </head>
  <body>
    <!-- Главный корневой элемент для React приложения -->
    <div id="root">
      <!-- Показываем лоадер пока загружается React -->
      <div class="app-loading">
        <div class="app-loading-content">
          <div class="app-loading-logo">🐗</div>
          <div class="app-loading-text">KabanChat</div>
          <div class="app-loading-spinner"></div>
        </div>
      </div>
    </div>
    
    <!-- React приложение загружается отсюда -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
